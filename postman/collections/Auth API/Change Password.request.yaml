$kind: http-request
name: Change Password
method: POST
url: '{{baseUrl}}/api/auth/change-password'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "currentPassword": "password123",
      "newPassword": "newpassword123"
    }
