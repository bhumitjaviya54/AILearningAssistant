$kind: http-request
name: Update Profile
method: PUT
url: '{{baseUrl}}/api/auth/profile'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "newusername"
    }
